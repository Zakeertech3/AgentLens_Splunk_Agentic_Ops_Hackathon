[AgentLens - Train Prompt Injection Classifier]
search = | inputlookup agentlens_training_data.csv | eval label=tonumber(label) | fit TFIDF prompt_text into agentlens_tfidf_vectorizer | fit GradientBoostingClassifier label from "prompt_text_tfidf_*" into agentlens_prompt_injection_classifier | stats count as trained_rows
description = Trains the TF-IDF vectorizer and prompt injection classifier from labeled training data
dispatch.earliest_time = 0
dispatch.latest_time = now

[AgentLens - Train Anomaly Detector]
search = index=agentlens name=ChatCompletion | eval tokens_total='attributes.tokens_total' | where isnotnull(tokens_total) AND tokens_total > 0 | fit DensityFunction tokens_total into agentlens_density_tokens | stats count as trained_rows
description = Trains the DensityFunction anomaly detector on LLM token usage patterns
dispatch.earliest_time = -30d
dispatch.latest_time = now

[AgentLens - Token Usage Trend]
search = index=agentlens name=ChatCompletion earliest=-24h | eval tokens_total='attributes.tokens_total' | where isnotnull(tokens_total) | timechart span=15m sum(tokens_total) as tokens | eval cost_usd=round(tokens*0.000003, 4)
description = Token usage and estimated cost trend over the last 24 hours
dispatch.earliest_time = -24h
dispatch.latest_time = now

[AgentLens - Drift Detection Alert]
search = index=agentlens name=ChatCompletion earliest=-5m | eval prompt_text=coalesce('attributes.llm.input_messages.1.message.content', "") | eval tokens_total='attributes.tokens_total' | where prompt_text != "" | apply agentlens_tfidf_vectorizer | apply agentlens_prompt_injection_classifier | apply agentlens_density_tokens | where 'predicted(label)'=1 OR 'IsOutlier(tokens_total)'=1 | eval alert_type=case('predicted(label)'=1, "prompt_injection", 'IsOutlier(tokens_total)'=1, "anomaly", 1=1, "unknown") | table _time service_name alert_type prompt_text tokens_total
description = Detects prompt injections and token anomalies in real-time
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert.track = 1
alert.suppress = 0
counttype = number of events
quantity = 0
relation = greater than
